<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 Product Spin</title>
    <style>
        body { font-family: 'Helvetica', sans-serif; background: #fdfdfd; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .product-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; width: 400px; }

        /* 360 Viewer Styling */
        #threesixty-viewer {
            width: 100%;
            height: 300px;
            margin: 0 auto;
            background-image: url('https://the-m-project.org/img/360-sprite.jpg'); /* This is a long strip of images */
            background-repeat: no-repeat;
            background-size: 3600% 100%; /* 36 images in one strip */
            cursor: ew-resize;
            background-position: 0% 0%;
        }

        .price { font-size: 24px; font-weight: bold; color: #333; margin: 15px 0; }
        .spin-icon { font-size: 20px; color: #888; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="product-card">
    <div id="threesixty-viewer"></div>
    
    <span class="spin-icon">🔄 360°</span>
    <h2>Bagel Style Bed</h2>
    <div class="price">₦850,000</div>
    <p style="color: #777;">Swipe or drag to explore every angle</p>
</div>

<script>
    const viewer = document.getElementById('threesixty-viewer');
    const totalFrames = 36; // Number of images in the sequence
    let currentFrame = 0;
    let isDragging = false;
    let startX = 0;

    function updateFrame(frameIndex) {
        // This moves the "strip" left and right to show the next angle
        const percentage = (frameIndex / (totalFrames - 1)) * 100;
        viewer.style.backgroundPosition = `${percentage}% 0%`;
    }

    const startAction = (e) => {
        isDragging = true;
        startX = e.pageX || e.touches[0].pageX;
    };

    const moveAction = (e) => {
        if (!isDragging) return;
        const x = e.pageX || e.touches[0].pageX;
        const diff = x - startX;
        
        // Sensitivity: change frame every 10 pixels of drag
        if (Math.abs(diff) > 10) {
            if (diff > 0) {
                currentFrame = (currentFrame + 1) % totalFrames;
            } else {
                currentFrame = (currentFrame - 1 + totalFrames) % totalFrames;
            }
            updateFrame(currentFrame);
            startX = x;
        }
    };

    const endAction = () => { isDragging = false; };

    // Mouse Events
    viewer.addEventListener('mousedown', startAction);
    window.addEventListener('mousemove', moveAction);
    window.addEventListener('mouseup', endAction);

    // Touch Events
    viewer.addEventListener('touchstart', startAction);
    viewer.addEventListener('touchmove', moveAction);
    viewer.addEventListener('touchend', endAction);
</script>

</body>
</html>
